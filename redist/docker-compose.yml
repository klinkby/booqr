  # 1. SECURITY: Docker Socket Proxy (Pinned to v0.4.2)
  docker-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-proxy
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    environment:
      - CONTAINERS=1
      - STATS=1
    volumes:
      - ${CONTAINER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - monitor-net

  # 2. AGENT: OTel Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.148.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-config.yaml"]
    user: "0:0"
    cap_drop: [ALL]
    cap_add: [DAC_READ_SEARCH]
    env_file: .env
    volumes:
      - ./otel-config.yaml:/etc/otel-config.yaml:ro
      - ${CONTAINER_LOG_PATH:-/var/lib/docker/containers}:/var/lib/docker/containers:ro
    depends_on:
      - docker-proxy
      - observe
    networks:
      - monitor-net

  # 3. BACKEND: OpenObserve (Pinned to v0.70.0)
  observe:
    image: public.ecr.aws/zinclabs/openobserve:v0.70.0
    container_name: observe
    restart: unless-stopped
    ports:
      - '5080:5080/tcp'
    env_file: .env
    environment:
      - ZO_ROOT_USER_EMAIL=${ADMIN_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ADMIN_PASSWORD}
      - ZO_DATA_DIR=/data
    volumes:
      - oo-data:/data
    security_opt: [no-new-privileges:true]
    networks:
      - monitor-net
volumes:
#  postgres_socket: null
#  booqr_socket: null
#  app_socket: null
  oo-data: null
networks:
#  service-net: null
#  gateway-net: null
  monitor-net: null
